<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="2"/>
        </pattern>
        <linearGradient id="robot-metal" x1="200" y1="200" x2="300" y2="400" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#4a8c5c"/>
            <stop offset="1" stop-color="#2a2a4a"/>
        </linearGradient>
         <linearGradient id="rake-wood" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#c8a620"/>
            <stop offset="1" stop-color="#a07a10"/>
        </linearGradient>
         <clipPath id="squircle-clip-v1">
            <!-- Increased rx to make corners sharper, matching standard macOS icons -->
            <rect width="460" height="460" x="26" y="26" rx="104"/>
        </clipPath>
    </defs>
    
    <!-- Base background container (transparent) to allow padding for the squircle -->
    <rect width="512" height="512" fill="transparent"/>

    <!-- The actual clipped content, inset by 26px on all sides -->
    <g clip-path="url(#squircle-clip-v1)">
        <!-- App Grid Background -->
        <rect x="26" y="26" width="460" height="460" fill="#1a1a2e"/>
        <rect x="26" y="26" width="460" height="460" fill="url(#grid)"/>

        <!-- Add a subtle inner shadow/border to match Apple's icon style -->
        <rect x="26" y="26" width="460" height="460" rx="104" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

        <!-- Scaled down the entire scene slightly and moved it up/left as requested -->
        <g transform="translate(10, 10) scale(0.95)">
            
            <!-- Central Camera Crosshair -->
            <g stroke="#ff6b6b" stroke-width="4" opacity="0.6" stroke-linecap="round">
                <line x1="240" y1="256" x2="272" y2="256" />
                <line x1="256" y1="240" x2="256" y2="272" />
            </g>

            <!-- Square-faced Robot (Moved up and left) -->
            <g transform="translate(30, 10)">
                <!-- 80s Antenna -->
                <path d="M260 180 L260 130" stroke="url(#robot-metal)" stroke-width="6" stroke-linecap="round"/>
                <circle cx="260" cy="130" r="10" fill="#ff6b6b"/>

                <!-- Arms -->
                <rect x="180" y="290" width="30" height="90" rx="8" fill="url(#robot-metal)"/> 
                <rect x="310" y="290" width="30" height="90" rx="8" fill="url(#robot-metal)"/> 

                <!-- Legs -->
                <rect x="220" y="390" width="30" height="70" rx="8" fill="url(#robot-metal)"/> 
                <rect x="270" y="390" width="30" height="70" rx="8" fill="url(#robot-metal)"/> 

                <!-- Body -->
                <rect x="210" y="280" width="100" height="120" rx="10" fill="url(#robot-metal)"/> 
                
                <!-- Square Face -->
                <rect x="210" y="180" width="100" height="100" rx="15" fill="url(#robot-metal)"/> 
                
                <!-- Heterochromia Robotic Eyes -->
                <rect x="230" y="210" width="20" height="10" rx="2" fill="#6bff8a"/> 
                <rect x="270" y="210" width="20" height="10" rx="2" fill="#ff6b6b"/> 
                
                <!-- Mouth -->
                <path d="M230 250 L290 250" stroke="#16213e" stroke-width="5" stroke-linecap="round"/> 
            </g>

            <!-- The Rake (Moved to match the robot shift) -->
            <g transform="translate(-20, -30) rotate(30 280 240)">
                <!-- Handle -->
                <rect x="270" y="140" width="20" height="320" rx="5" fill="url(#rake-wood)"/>
                <!-- Rake Head -->
                <rect x="210" y="440" width="140" height="20" rx="4" fill="#e0e0e0"/>
                <!-- Added a 7th tooth, spread out slightly more -->
                <path d="M215 455 L175 413 M235 455 L195 413 M255 455 L215 413 M275 455 L235 413 M295 455 L255 413 M315 455 L275 413 M335 455 L295 413" stroke="#e0e0e0" stroke-width="8" stroke-linecap="round"/>
            </g>

        </g>
        
        <!-- Camera HUD using primary palette colors -->
        <!-- Scaled slightly down to fit inside the new padded area -->
        <g transform="translate(26, 26) scale(0.9)" stroke="#ff6b6b" stroke-width="8" fill="none" opacity="0.9">
            <path d="M50 150 V50 H150" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M362 50 H462 V150" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M462 362 V462 H362" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M150 462 H50 V362" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
    </g>
</svg>